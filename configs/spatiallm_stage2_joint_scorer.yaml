### original SpatialLM initialization for joint LLM + scorer training
model_name_or_path: manycore-research/SpatialLM1.1-Qwen-0.5B
trust_remote_code: true

### joint-training method
do_train: true
do_eval: true
freeze_language_tower: false
freeze_point_tower: false
train_proj_only: false
point_cloud_batch_encoding: true
point_token_scorer_gt_mask: true
point_token_bbox_mask: false
point_token_bbox_expand_ratio: 0.1
scorer_init_path: /data2/chenjq24/SpatialLM/saves/point_token_scorer/stage2_res16_spatiallm_original_online
scorer_threshold: 0.5
scorer_min_keep: 1
scorer_max_keep: 4096
scorer_loss_weight: 1.0
scorer_pos_weight: auto
scorer_detach_input: true

### stage-2 region data
dataset_dir: /data2/chenjq24/SpatialLM/spatiallm-dataset-link
dataset: spatiallm_stage2_bbox_train_20000
eval_dataset: spatiallm_stage2_bbox_val
template: spatiallm_qwen
num_bins: 1280
world_size: 16.0
max_point_tokens: 4096
cutoff_len: 8192
do_augmentation: false
random_rotation: true
overwrite_cache: true
preprocessing_num_workers: 8
val_size: 0

### optimization
num_train_epochs: 4
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
weight_decay: 0.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
bf16: true
fp16: false
pure_bf16: false
tf32: true
ddp_timeout: 180000000
ddp_find_unused_parameters: false
dataloader_num_workers: 8
dataloader_pin_memory: true
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2

### checkpoint/eval
output_dir: /data2/chenjq24/SpatialLM/saves/hierarchical/stage2_bboxes_20000_res16_max4096_joint_scorer
overwrite_output_dir: false
auto_resume_from_latest_checkpoint: true
reset_scheduler_on_resume: true
logging_steps: 10
save_steps: 2000
save_total_limit: 5
eval_strategy: steps
eval_steps: 500
run_name: stage2_res16_max4096_joint_scorer

